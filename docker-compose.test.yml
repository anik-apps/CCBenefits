services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: ccbenefits_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:-ccbenefits:test}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://test:test@postgres:5432/ccbenefits_test
      CCB_SECRET_KEY: test-secret-key-for-integration
      CCB_ENV: production
      CCB_ALLOWED_ORIGINS: http://localhost:8080,http://localhost
      CCB_ADMIN_EMAILS: admin@integration.test
      CCB_SCHEDULER_ENABLED: "false"
      CCB_AUTO_VERIFY: "true"
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:80/api/health')\""]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s
