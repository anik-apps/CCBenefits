name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests with coverage
        run: poetry run pytest -v

      - name: Extract coverage percentage
        if: success()
        id: coverage
        run: |
          COV=$(poetry run coverage report --format=total)
          echo "total=$COV" >> $GITHUB_OUTPUT

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/master' && success()
        run: |
          COV=${{ steps.coverage.outputs.total }}
          if [ "$COV" -ge 90 ]; then COLOR="brightgreen";
          elif [ "$COV" -ge 80 ]; then COLOR="green";
          elif [ "$COV" -ge 70 ]; then COLOR="yellowgreen";
          elif [ "$COV" -ge 60 ]; then COLOR="yellow";
          else COLOR="red"; fi
          mkdir -p ../badges
          curl -s "https://img.shields.io/badge/coverage-${COV}%25-${COLOR}" > ../badges/coverage.svg

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/master' && success()
        working-directory: .
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add badges/coverage.svg
          git diff --cached --quiet && exit 0
          git commit -m "Update coverage badge [skip ci]"
          git push

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Type check & build
        run: npm run build

      - name: Lint
        run: npm run lint
        continue-on-error: true
