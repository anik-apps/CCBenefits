name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update Playwright visual regression baselines'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests & lint (run on every push/PR)
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (ruff)
        run: poetry run ruff check ccbenefits/ tests/

      - name: Test Alembic migrations (SQLite)
        run: |
          poetry run alembic upgrade head
          poetry run alembic downgrade base
          poetry run alembic upgrade head
          rm -f test_migrations.db
        env:
          DATABASE_URL: "sqlite:///./test_migrations.db"

      - name: Run tests with coverage
        run: poetry run pytest -v

      - name: Extract coverage percentage
        if: success()
        id: coverage
        run: |
          COV=$(poetry run coverage report --format=total)
          echo "total=$COV" >> $GITHUB_OUTPUT

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: backend/htmlcov/

    outputs:
      backend-coverage: ${{ steps.coverage.outputs.total }}

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Type check & build
        run: npm run build

      - name: Run tests with coverage
        id: coverage
        run: |
          npm test 2>&1 | tee test-output.txt
          COV=$(grep 'Statements' test-output.txt | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "total=${COV%.*}" >> $GITHUB_OUTPUT

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

      - name: Lint
        run: npm run lint

    outputs:
      frontend-coverage: ${{ steps.coverage.outputs.total }}

  mobile-tests:
    name: Mobile Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests with coverage
        id: coverage
        run: |
          npx jest --coverage --no-watchman 2>&1 | tee test-output.txt
          COV=$(grep 'Statements' test-output.txt | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "total=${COV%.*}" >> $GITHUB_OUTPUT

      - name: Upload mobile coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-coverage-report
          path: mobile/coverage/

    outputs:
      mobile-coverage: ${{ steps.coverage.outputs.total }}

  shared-code-drift:
    name: Shared Code Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check types.ts is in sync
        run: diff frontend/src/types.ts mobile/src/types.ts || { echo "::error::frontend/src/types.ts and mobile/src/types.ts have drifted apart. Update both files to match."; exit 1; }

  # ---------------------------------------------------------------------------
  # Grafana dashboard validation (only when grafana/ files change)
  # ---------------------------------------------------------------------------
  grafana-check-changes:
    name: Check Grafana Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.grafana }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            grafana:
              - 'grafana/**'

  grafana-validate:
    name: Validate Grafana Dashboards
    needs: grafana-check-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.grafana-check-changes.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Install grafanactl
        run: go install github.com/grafana/grafanactl/cmd/grafanactl@v0.1.9

      - name: Configure grafanactl
        run: |
          grafanactl config set contexts.default.grafana.server https://anikapps.grafana.net
          grafanactl config set contexts.default.grafana.token ${{ secrets.GRAFANA_SA_TOKEN }}

      - name: Validate dashboards
        run: grafanactl resources validate -p grafana/dashboards/

  grafana-sync:
    name: Sync Grafana Dashboards (master)
    needs: grafana-check-changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && needs.grafana-check-changes.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Install grafanactl
        run: go install github.com/grafana/grafanactl/cmd/grafanactl@v0.1.9

      - name: Configure grafanactl
        run: |
          grafanactl config set contexts.default.grafana.server https://anikapps.grafana.net
          grafanactl config set contexts.default.grafana.token ${{ secrets.GRAFANA_SA_TOKEN }}

      - name: Push dashboards
        run: grafanactl resources push -p grafana/dashboards/

  # ---------------------------------------------------------------------------
  # Integration tests: Docker build + API smoke tests + Playwright E2E
  # Runs after backend + frontend pass
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    needs: [backend-tests, frontend-build, mobile-tests, shared-code-drift]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ccbenefits:test
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start test stack
        run: |
          APP_IMAGE=ccbenefits:test \
            docker compose -f docker-compose.test.yml up -d

      - name: Wait for app health
        run: |
          for i in $(seq 1 20); do curl -sf http://localhost:8080/api/health && break; sleep 3; done
          curl -sf http://localhost:8080/api/health || { echo "Health check failed"; docker compose -f docker-compose.test.yml logs app; exit 1; }

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install backend deps
        working-directory: backend
        run: poetry install --no-interaction

      - name: Run API smoke tests
        working-directory: backend
        run: poetry run pytest tests/integration/ -v --no-cov
        env:
          INTEGRATION_BASE_URL: http://localhost:8080

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: tests/e2e
        run: |
          if [ "${{ github.event.inputs.update_snapshots }}" = "true" ]; then
            npx playwright test --update-snapshots
          else
            npx playwright test
          fi
        env:
          BASE_URL: http://localhost:8080

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: |
            tests/e2e/test-results/
            tests/e2e/playwright-report/

      - name: Upload updated baselines
        if: github.event.inputs.update_snapshots == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-baselines
          path: tests/e2e/*.spec.ts-snapshots/

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ---------------------------------------------------------------------------
  # Post-merge jobs (master only)
  # ---------------------------------------------------------------------------
  update-badges:
    name: Update Coverage Badges (master)
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate badges
        run: |
          mkdir -p badges

          BE=${{ needs.backend-tests.outputs.backend-coverage }}
          if [ "$BE" -ge 90 ]; then BE_COLOR="brightgreen";
          elif [ "$BE" -ge 80 ]; then BE_COLOR="green";
          elif [ "$BE" -ge 70 ]; then BE_COLOR="yellowgreen";
          elif [ "$BE" -ge 60 ]; then BE_COLOR="yellow";
          else BE_COLOR="red"; fi
          curl -s "https://img.shields.io/badge/backend-${BE}%25-${BE_COLOR}" > badges/backend-coverage.svg

          FE=${{ needs.frontend-build.outputs.frontend-coverage }}
          if [ "$FE" -ge 90 ]; then FE_COLOR="brightgreen";
          elif [ "$FE" -ge 80 ]; then FE_COLOR="green";
          elif [ "$FE" -ge 70 ]; then FE_COLOR="yellowgreen";
          elif [ "$FE" -ge 60 ]; then FE_COLOR="yellow";
          else FE_COLOR="red"; fi
          curl -s "https://img.shields.io/badge/frontend-${FE}%25-${FE_COLOR}" > badges/frontend-coverage.svg

      - name: Commit badges
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add badges/
          git diff --cached --quiet && exit 0
          git commit -m "Update coverage badges [skip ci]"
          git push

  mobile-build:
    name: Mobile App Build — EAS (master)
    needs: integration-tests
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: mobile-build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install

      - name: Build Android preview APK
        working-directory: mobile
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  deploy:
    name: Deploy to Production (master)
    needs: integration-tests
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag SHA image as latest
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            cd ~/ccbenefits
            echo "$GHCR_TOKEN" | docker login ghcr.io --username "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            # Health check with retry
            for i in $(seq 1 10); do curl -sf http://localhost/api/health && exit 0; sleep 3; done
            echo "Health check failed"; docker compose -f docker-compose.prod.yml logs app --tail 50; exit 1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
