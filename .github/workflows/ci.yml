name: CI

on:
  pull_request:
    branches: [master]
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (ruff)
        run: poetry run ruff check ccbenefits/ tests/

      - name: Run tests with coverage
        run: poetry run pytest -v

      - name: Extract coverage percentage
        if: success()
        id: coverage
        run: |
          COV=$(poetry run coverage report --format=total)
          echo "total=$COV" >> $GITHUB_OUTPUT

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: backend/htmlcov/

    outputs:
      backend-coverage: ${{ steps.coverage.outputs.total }}

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Type check & build
        run: npm run build

      - name: Run tests with coverage
        id: coverage
        run: |
          npm test 2>&1 | tee test-output.txt
          COV=$(grep 'Statements' test-output.txt | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "total=${COV%.*}" >> $GITHUB_OUTPUT

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

      - name: Lint
        run: npm run lint

    outputs:
      frontend-coverage: ${{ steps.coverage.outputs.total }}

  shared-code-drift:
    name: Shared Code Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check types.ts is in sync
        run: diff frontend/src/types.ts mobile/src/types.ts || { echo "::error::frontend/src/types.ts and mobile/src/types.ts have drifted apart. Update both files to match."; exit 1; }

  update-badges:
    name: Update Coverage Badges
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/master' && success()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Generate badges
        run: |
          mkdir -p badges

          BE=${{ needs.backend-tests.outputs.backend-coverage }}
          if [ "$BE" -ge 90 ]; then BE_COLOR="brightgreen";
          elif [ "$BE" -ge 80 ]; then BE_COLOR="green";
          elif [ "$BE" -ge 70 ]; then BE_COLOR="yellowgreen";
          elif [ "$BE" -ge 60 ]; then BE_COLOR="yellow";
          else BE_COLOR="red"; fi
          curl -s "https://img.shields.io/badge/backend-${BE}%25-${BE_COLOR}" > badges/backend-coverage.svg

          FE=${{ needs.frontend-build.outputs.frontend-coverage }}
          if [ "$FE" -ge 90 ]; then FE_COLOR="brightgreen";
          elif [ "$FE" -ge 80 ]; then FE_COLOR="green";
          elif [ "$FE" -ge 70 ]; then FE_COLOR="yellowgreen";
          elif [ "$FE" -ge 60 ]; then FE_COLOR="yellow";
          else FE_COLOR="red"; fi
          curl -s "https://img.shields.io/badge/frontend-${FE}%25-${FE_COLOR}" > badges/frontend-coverage.svg

      - name: Commit badges
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add badges/
          git diff --cached --quiet && exit 0
          git commit -m "Update coverage badges [skip ci]"
          git push
