name: Sync Grafana Dashboards

on:
  push:
    branches: [master]
    paths: ['grafana/**']

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    name: Push Dashboards to Grafana
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install grafanactl
        run: go install github.com/grafana/grafanactl/cmd/grafanactl@v0.1.9

      - name: Configure grafanactl
        run: |
          grafanactl config set contexts.default.grafana.server https://anikapps.grafana.net
          grafanactl config set contexts.default.grafana.token ${{ secrets.GRAFANA_SA_TOKEN }}

      - name: Push dashboards
        run: grafanactl resources push -p grafana/dashboards/
