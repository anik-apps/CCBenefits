name: Integration Tests & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:  # Emergency escape hatch

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (SHA tag)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start test stack
        run: |
          APP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            docker compose -f docker-compose.test.yml up -d

      - name: Wait for app health
        run: |
          for i in $(seq 1 20); do curl -sf http://localhost:8080/api/health && break; sleep 3; done
          curl -sf http://localhost:8080/api/health || { echo "Health check failed"; docker compose -f docker-compose.test.yml logs app; exit 1; }

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install backend deps
        working-directory: backend
        run: poetry install --no-interaction

      - name: Run API smoke tests
        working-directory: backend
        run: poetry run pytest tests/integration/ -v --no-cov
        env:
          INTEGRATION_BASE_URL: http://localhost:8080

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: tests/e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost:8080

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-results
          path: |
            tests/e2e/test-results/
            tests/e2e/playwright-report/

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  mobile-build:
    name: Mobile App Build (EAS)
    needs: integration-tests
    if: success()
    runs-on: ubuntu-latest
    environment: mobile-build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install

      - name: Build Android preview APK
        working-directory: mobile
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  deploy:
    name: Deploy to Production
    needs: integration-tests
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag SHA image as latest
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            cd ~/ccbenefits
            echo "$GHCR_TOKEN" | docker login ghcr.io --username "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            # Health check with retry
            for i in $(seq 1 10); do curl -sf http://localhost/api/health && exit 0; sleep 3; done
            echo "Health check failed"; docker compose -f docker-compose.prod.yml logs app --tail 50; exit 1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
