name: Validate Grafana Dashboards

on:
  pull_request:
    paths: ['grafana/**']

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Dashboard Definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Install grafanactl
        run: go install github.com/grafana/grafanactl/cmd/grafanactl@v0.1.9

      - name: Configure grafanactl
        run: |
          grafanactl config set contexts.default.grafana.server https://anikapps.grafana.net
          grafanactl config set contexts.default.grafana.token ${{ secrets.GRAFANA_SA_TOKEN }}

      - name: Validate dashboards
        run: grafanactl resources validate -p grafana/dashboards/
