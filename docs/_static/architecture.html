<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCBenefits Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; overflow: auto; }
  svg { width: 100%; height: 100vh; display: block; }
  svg text { font-family: system-ui, -apple-system, sans-serif; }

  .node { cursor: pointer; transition: transform 0.2s ease, filter 0.2s ease; }
  .node:hover { filter: brightness(1.25) drop-shadow(0 0 8px rgba(255,255,255,0.1)); }
  .node rect { transition: all 0.3s; }
  .node.expanded rect { stroke-width: 3; }

  .conn { fill: none; stroke-width: 1.5; opacity: 0.55; }
  .conn.dashed { stroke-dasharray: 6 4; }
  .conn-label { font-size: 9.5px; opacity: 0.75; font-weight: 500; }

  .detail-panel {
    position: fixed; right: -440px; top: 0; width: 440px; height: 100vh;
    background: #12121aee; border-left: 2px solid #2a2a3a; padding: 28px;
    overflow-y: auto; transition: right 0.3s ease; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .detail-panel.open { right: 0; }
  .detail-panel h2 { color: #c9a84c; margin-bottom: 8px; font-size: 1.3em; }
  .detail-panel .subtitle { color: #888; font-size: 0.85em; margin-bottom: 16px; }
  .detail-panel .close-btn {
    position: absolute; top: 16px; right: 16px; background: none; border: 1px solid #444;
    color: #aaa; width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
  }
  .detail-panel .close-btn:hover { border-color: #c9a84c; color: #c9a84c; }
  .detail-section { margin-bottom: 20px; }
  .detail-section h3 { color: #c9a84c; font-size: 0.9em; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .detail-section p { color: #bbb; font-size: 0.85em; line-height: 1.6; }
  .detail-section code {
    display: block; background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 6px;
    padding: 10px 12px; font-size: 0.8em; color: #c9a84c; margin-top: 6px;
    white-space: pre-wrap; font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
  }
  .detail-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  .detail-table th { text-align: left; color: #c9a84c; font-size: 0.75em; padding: 6px 8px; border-bottom: 1px solid #333; }
  .detail-table td { color: #bbb; font-size: 0.8em; padding: 6px 8px; border-bottom: 1px solid #1a1a24; }

  .legend {
    position: fixed; bottom: 16px; left: 16px; display: flex; gap: 16px; z-index: 50;
    background: rgba(18,18,26,0.9); border: 1px solid #2a2a3a; border-radius: 10px;
    padding: 10px 20px; backdrop-filter: blur(8px);
  }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #999; }
  .legend-dot { width: 14px; height: 14px; border-radius: 4px; border: 2px solid; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 90; display: none; }
  .overlay.open { display: block; }
</style>
</head>
<body>

function showDetail(id) {
  const d = details[id];
  if (!d) return;
  let html = `<h2>${d.title}</h2><p class="subtitle">${d.subtitle}</p>`;
  d.sections.forEach(s => {
    html += `<div class="detail-section"><h3>${s.heading}</h3>`;
    if (s.text) html += `<p>${s.text.replace(/\n/g, '<br>')}</p>`;
    if (s.code) html += `<code>${s.code}</code>`;
    if (s.table) {
      html += '<table class="detail-table"><thead><tr>';
      s.table[0].forEach(h => html += `<th>${h}</th>`);
      html += '</tr></thead><tbody>';
      s.table.slice(1).forEach(row => { html += '<tr>'; row.forEach(c => html += `<td>${c}</td>`); html += '</tr>'; });
      html += '</tbody></table>';
    }
    html += '</div>';
  });
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.querySelectorAll('.node').forEach(n => n.classList.remove('expanded'));
  document.querySelector(`.node[data-id="${id}"]`)?.classList.add('expanded');
}
function hideDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.querySelectorAll('.node').forEach(n => n.classList.remove('expanded'));
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideDetail(); });
